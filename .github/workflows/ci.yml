name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Stub values for build-time embedding of NEXT_PUBLIC_* in the client bundle.
# Real secrets stay in Vercel / local .env.local — CI only verifies the pipeline.
env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ci-stub-api-key
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-stub.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-stub-project
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-stub.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
  NEXT_PUBLIC_FIREBASE_APP_ID: 1:123456789012:web:ci-stub-app-id

jobs:
  lint-and-build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: piton-restoran-oneri:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}
